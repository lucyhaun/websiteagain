<!DOCTYPE html>
<html lang="en">
    <head>
       <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="artwork.css">
        <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Artwork</title>
    <style>
    h2 { text-align: left;}
    h1 {color: gray;}

    body {
    margin: 0;
    padding: 20px;
    background: #f3f3f3;
    }
     .fade-image {
    opacity: 0;
    transform: translateY(50px);
    transition:
    opacity 3s ease,
    transform 3s ease;
    }

    .fade-image.visible {
    opacity: 1;
    transform: translateY(0);
    }   
     .gallery {
    column-count: 2;
    column-gap: 15px;
    }

    .gallery img {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 15px;
    break-inside: avoid;
    border-radius: 8px;
    }

/* Tablet */
@media (max-width: 600px) {
    .gallery {
        column-count: 2;
    }
}

    </style>
    </head>
    <body>
        <div class="b">
            <h1>
                Lucy Haun 
            </h1>
          
            <div>
            <h2>Oil on wooden board</h2>
                
                <div class=" fade-image gallery">
                    <img src="nov.jpg" > 
                    
                    <img src="nov2.jpg">
                    <img src="nov6.jpg">
                    <img src="nov4.jpg">  
                  
                    <img src="nov3.jpg">  
                
                    <img src="artworkfiles/twop.jpg" style="display: inline-block; width: 49.5%">
                    <img src="artworkfiles/onep.jpg" style="display: inline-block; width: 49.5%">
                            
                             
                </div>
       <script>
            const observer = new IntersectionObserver(
        (entries) => {
            entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
            });
        },
        {
            rootMargin: "0px 0px -150px 0px"
        }
        );

        document
        .querySelectorAll('.fade-image')
        .forEach(img => observer.observe(img));
        </script>
    </body>
</html>
