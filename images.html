<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">
       <link rel="stylesheet" href="style.css">
        
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camera</title>
    <style>
    div {text-align: center;};
    @media (max-width:1300px) {
    
   
    }
    
    .word a{
        margin:10px;
        font-size: clamp(1.5rem, 2vw, 2.3rem);}

    .b {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    }

    .centre-image {
    width: 400px; /* adjust size */
    height: auto;
    margin-bottom: 20px;
    }

    .fade-image {
    opacity: 0;
    transform: translateY(20px);
    transition:
    opacity 0.8s ease,
    transform 0.8s ease;
    }

    .fade-image.visible {
    opacity: 1;
    transform: translateY(0);
    }   

    </style>
    </head>
    
<body style="background: url('pppp.jpg') center/cover no-repeat;">
    <br>
        <div class="b word"> 
            <a href="thematic.html">Cinematic</a> 
            <a href="portrait.html">Portrait</a>  <br>
            <img class="centre-image fade-image" src="meee.jpg" loading="lazy">
            
        </div>
              
    <script>
        const observer = new IntersectionObserver(
    (entries) => {
        entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
        }
        });
    },
    {
        threshold: 0.15
    }
    );

    document
    .querySelectorAll('.fade-image')
    .forEach(img => observer.observe(img));
    </script>
</body>
</html>
