<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing</title>

    <style>
        p {
            padding-left: 30px;
            padding-right: 30px;
            color: rgb(87, 87, 87);
            margin-bottom: 0px;
            font-size: 15px;
        }

        h2 {
            padding-left: 30px;
            color: rgb(56, 56, 56);
            font-size: 18px;
        }

        h1 {
            color: gray;
        }

        /* Album Buttons */
        .album-buttons {
            text-align: center;
            margin: 30px 0;
        }

        .album-buttons button {
            padding: 12px 24px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            background: #666;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .album-buttons button:hover {
            background: #444;
        }

        /* Masonry Gallery */
        .gallery {
            display: none;
            column-count: 5;
            column-gap: 15px;
            padding: 0 30px 30px;
        }

        .gallery.active {
            display: block;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
            border-radius: 8px;
            break-inside: avoid;
        }

        /* Tablet */
        @media (max-width: 700px) {
            .gallery {
                column-count: 2;
            }
        }

    </style>
</head>

<body>

    <h1 style="text-align:center;">Camera</h1>

    <script>
        function showAlbum(albumId) {
            document.querySelectorAll('.gallery').forEach(gallery => {
                gallery.classList.remove('active');
            });

            document.getElementById(albumId).classList.add('active');
        }
