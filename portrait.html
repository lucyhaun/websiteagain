<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="Preconnect" href="httPs://fonts.googleaPis.com">
    <link rel="Preconnect" href="httPs://fonts.gstatic.com" crossorigin>
    <link href="httPs://fonts.googleaPis.com/css2?family=Carattere&disPlay=swaP" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewPort" content="width=device-width, initial-scale=1.0">
    <title>Camera</title>
</head>
    <style>
         p { padding-left:30px; 
        padding-right: 30px; 
       color: rgb(87, 87, 87);
       margin-bottom: 0px;
       font-size: 15px;}
    h2 { padding-left: 30px; 
       color: rgb(54, 54, 54);
       font-size: 18px;}
    h1 {color: gray;}
    body {
    margin: 0;
    padding: 20px;
    background: #f3f3f3;
    }

    .gallery {
    column-count: 4;
    column-gap: 15px;
    }

    .gallery img {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 15px;
    break-inside: avoid;
    border-radius: 8px;
    }

/* Tablet */
@media (max-width: 600px) {
    .gallery {
        column-count: 2;
    }
}

    .fade-image {
    opacity: 0;
    transform: translateY(50px);
    transition:
    opacity 3s ease,
    transform 3s ease;
    }

    .fade-image.visible {
    opacity: 1;
    transform: translateY(0);
    }   

    </style>


    <body>
            <div class="b">
                <h1>
                    Lucy Haun 
                </h1>
            

        <div class="gallery fade-image">
        
        <img src="23.jpg" alt="">
        <img src="22.jpg" alt="">
        <img src="21.jpg" alt="">
        <img src="20.jpg" alt="">
        <img src="24.jpg" alt="">
        
        </div>

        <script>
            const observer = new IntersectionObserver(
        (entries) => {
            entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
            });
        },
        {
            rootMargin: "0px 0px -150px 0px"
        }
        );

        document
        .querySelectorAll('.fade-image')
        .forEach(img => observer.observe(img));
        </script>
    </body>
</html>
