<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camera</title>
    </head>
    <style>
    p { padding-left:30px; 
        padding-right: 30px; 
       color: rgb(87, 87, 87);
       margin-bottom: 0px;
       font-size: 15px;}
    h2 { padding-left: 30px; 
       color: rgb(56, 56, 56);
       font-size: 18px;}
    h1 {color: gray;}
    body {
    margin: 0;
    padding: 20px;
    background: #f3f3f3;
    }

    .gallery {
    column-count: 5;
    column-gap: 15px;
    }

    .gallery img {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 15px;
    break-inside: avoid;
    border-radius: 8px;
    }

/* Tablet */
@media (max-width: 600px) {
    .gallery {
        column-count: 2;
    }
}

    .fade-image {
    opacity: 0;
    transform: translateY(50px);
    transition:
    opacity 3s ease,
    transform 3s ease;
    }

    .fade-image.visible {
    opacity: 1;
    transform: translateY(0);
    }   

    </style>

    <body>
            <div class="b">
                <h1>
                    Lucy Haun 
                </h1>
            
        <div class="gallery fade-image">
        <img src="Photos/them2.jpg" alt="">
        <img src="Photos/them3.jpg" alt="">
        <img src="Photos/them4.jpg" alt="">
        <img src="Photos/them5.jpg" alt="">
        <img src="Photos/them6.jpg" alt="">
        <img src="Photos/them7.jpg" alt="">

        <img src="Photos/them9.jpg" alt="">
        <img src="Photos/them10.jpg" alt="">

        <img src="Photos/them12.jpg" alt="">

        <img src="Photos/them14.jpg" alt="">
        <img src="Photos/them15.jpg" alt="">
        <img src="Photos/them16.jpg" alt="">
        <img src="Photos/them17.jpg" alt="">
        <img src="Photos/them18.jpg" alt="">

        <img src="Photos/them32.jpg" alt="">

        
        </div>
            
        <script>
            const observer = new IntersectionObserver(
        (entries) => {
            entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
            });
        },
        {
            rootMargin: "0px 0px -150px 0px"
        }
        );

        document
        .querySelectorAll('.fade-image')
        .forEach(img => observer.observe(img));
        </script>
    </body>
</html>
